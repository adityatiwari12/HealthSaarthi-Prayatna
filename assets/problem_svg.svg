  <text x="254" y="363" font-size="10" fill="#94A3B8" style="fill:rgb(148, 163, 184);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Space Grotesk&quot;, sans-serif;font-size:10px;font-weight:400;text-anchor:start;dominant-baseline:auto">0 — none at all</text>

