  <text x="494" y="391" font-size="10" font-weight="600" fill="#DC2626" style="fill:rgb(220, 38, 38);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Space Grotesk&quot;, sans-serif;font-size:10px;font-weight:600;text-anchor:start;dominant-baseline:auto">6–10 min</text>

